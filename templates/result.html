<script>
var dimData={"criticism":{"name":"批评型","icon":"🔍","color":"#e74c3c","desc":"习惯性挑剔，总看到别人缺点","intro":"批评型的人往往对自己要求极高，对别人也不自觉地苛刻。他们不是故意伤人，而是把「指出问题」当成「帮助别人」的方式。内心缺乏安全感——担心如果不说出来，对方就不会进步，自己也失去了被需要的价值。","why":"你可能在成长过程中被过度批评，或者习惯了用挑剔来表达关心。在你的认知里，「指出错误=帮助别人」，却没有意识到这种方式正在推开你身边的人。","impact":"当你在会议中当众指出同事的错误，你以为自己在帮助团队改进。但对方的第一反应是防御和丢脸，而不是反思。当你赢了争论，却输了信任。","carnegieWhy":"「批评就像一种危险的武器，它在伤害别人的同时，也会摧毁人与人之间的信任。」——卡耐基","carnegieImpact":"「所以，当你想批评别人的时候，先停下来想一下：我的批评能达到我想要的效果吗？」——99%的人在面对批评时的第一反应都是防御，而非改变。","actions":["连续7天，每天找出一个人的优点并真诚地说出来","把「你这里不对」改成「如果这样会不会更好？」","每天睡前写下3件今天你欣赏的人的具体事例"],"quote":"「99%的情况下，不管犯多严重的错误，人们都不会责备自己。批评带来的并不是改变，而是怨恨。」"},"indifference":{"name":"冷漠型","icon":"❄️","color":"#95a5a6","desc":"只在乎自己，忽视对方感受","intro":"冷漠不是无情，而是一种长期忽视后形成的情感隔离。这类人在成长过程中情感需求未被满足，逐渐养成了「不指望任何人」的自我保护模式。他们的内心并不冷，只是太久没有打开过。","why":"你可能早年情感需求未被满足，养成了「不指望任何人」的自我保护模式。或者你太忙于自己的事务，没有精力去关注他人的需求。","impact":"人是情感动物，被忽视比被批评更让人心寒。朋友倾诉了半小时，你只顾着刷手机——这些小事累积起来，身边的人渐渐不再找你，不是因为讨厌你，而是感受不到你的在乎。","carnegieWhy":"「如果你希望别人对你感兴趣，你先要对别人感兴趣。」——冷漠的人总是等待别人来关心自己，却从不主动付出。","carnegieImpact":"「最善于倾听的人，身边总是聚满了人，因为他们让人觉得被重视、被理解。」——那些最受欢迎的人，善于让别人说话。","actions":["每天主动问一个人「你今天怎么样」，并完整听完对方的回答","朋友分享时，先复述对方的话再回应：「那确实挺...」","每周给一个久未联系的朋友发一条消息"],"quote":"「人们只在乎自己的问题——你也一样。所以，想让别人喜欢你，先让他们觉得被关注。」"},"narcissism":{"name":"自恋型","icon":"🗣️","color":"#f39c12","desc":"聊天只说自己，不问对方","intro":"自恋型的人并不是真正的自大狂，而是内心深处缺乏被关注的感觉。他们需要通过讲述自己的故事来确认自己的价值——当别人说话时，他们感到被忽视；当自己说话时，才感到被重视。","why":"你可能内心深处缺乏安全感，需要通过别人的关注来确认自己的价值。这个模式让你陷入怪圈：越关注自己，越难建立真正的连接。","impact":"对话是双向的。当一段对话中只有一个人在说话，另一个人只是在等待「终于轮到我说了」，关系就已经失衡。朋友们开始害怕和你聊天，因为每次都变成你的独角戏。","carnegieWhy":"「一个让人喜欢的人，不是那些滔滔不绝的人，而是善于让别人说话的人。」——卡耐基","carnegieImpact":"「即使是最挑剔的人，也会在一个耐心倾听者面前软化。」——那些总是抢着说话的人，失去的往往比得到的多。","actions":["每次说话前先问自己：「对方真的想听我说这些吗？」","练习「重复+延伸」：先复述对方的话，再问一个相关问题","每周刻意创造一次只问问题、让对方说30分钟的机会"],"quote":"「想交朋友，就要耐心地听别人说话。让他们谈论自己——大多数人会因此喜欢你。」"},"forgetful":{"name":"记不住型","icon":"🧠","color":"#9b59b6","desc":"经常忘记别人名字和信息","intro":"记不住型的人并不是真的记忆力差，而是习惯性地活在自己的世界里。他们对人际细节不够上心，在他们的认知里，记住别人的名字是「小事」。但正是这些「小事」，构成了人与人之间最基本的尊重。","why":"你可能习惯活在自己的世界里，对他人的细节不够上心。名字是语言中最甜蜜的声音，记住别人，是一种尊重的表达。","impact":"别人用名字叫你，是为了让你们之间多一点熟悉感；而当你叫不出别人的名字时，传递的信号是「你对我不重要」。这不是故意的，但伤害是真实的。","carnegieWhy":"「记住别人的名字，并使用它——这是最简单、最有效的让人喜欢你的方法。」——卡耐基","carnegieImpact":"「一种最简单、最显著而又最重要的取得他人好感的方式，就是牢牢记住他的名字。」——那些总是记不住别人名字的人，往往在人际交往中处于劣势。","actions":["加上微信立刻改备注，写上职业+特点+在哪里认识","每次见面记住一个细节，下次见面时主动提起","把重要联系人的生日设日历提醒"],"quote":"「名字是心灵游戏中最重要的一部分。一个人的名字对他来说，是所有语言中最甜蜜、最重要的声音。」"},"defensive":{"name":"防御型","icon":"🛡️","color":"#e67e22","desc":"遇到分歧必须赢，无法接受不同意见","intro":"防御型的人把「认错」等于「承认自己不好」，把「被反驳」等于「被攻击」。在他们认知里，认输意味着软弱。这种模式让他们在争论中永远想赢，却在不知不觉中输掉了关系。","why":"你可能把「认错」等于「承认自己不好」，把「被反驳」等于「被攻击」。实际上，在争论中「赢」了的人，往往失去了更多——信任、关系、尊重。","impact":"没有人喜欢和一个「永远正确」的人在一起。你的防御姿态让对话变成了战争。渐渐地，他们开始躲着你。","carnegieWhy":"「在争论中唯一的方法就是避免争论。」——卡耐基","carnegieImpact":"「当你说『你错了』时，你们的对话就结束了；当你说『你有道理，但我的想法是』时，对话才能继续。」——永远不要说「你错了」，而是说「我的想法是」。","actions":["听到不同意见先说「你说得有道理」再表达自己","每天允许自己说一次「你说得对」","遇到分歧时先问自己：「我要的是对，还是关系？」"],"quote":"「如果你错了，迅速坦率地承认。这比为自己辩解更有力量。认错不会让你丢脸，反而会赢得尊重。」"},"taking":{"name":"索取型","icon":"🤲","color":"#1abc9c","desc":"只关注自己想从对方那里得到什么","intro":"索取型的人把关系当成交易，觉得「我对别人好」就要立刻得到回报。他们做事之前总要先算一笔账：这件事对我有什么好处？这种模式让他们很难建立真正的友谊。","why":"你可能把关系当成交易，觉得「我对别人好」就要立刻得到回报。或者你从小被教育要「精明」，所以做每件事都要考虑「值不值」。当你放下「我能得到什么」的计算时，你反而会发现周围的人都愿意帮你。","impact":"关系不是交易。当你帮人的时候想着回报，那不是帮助，是投资。身边的人会感受到你的「目的性」，从而保持距离。","carnegieWhy":"「你想让别人做什么，你就先给别人做什么。」——卡耐基","carnegieImpact":"「不要计较得失，真正的给予者，收获最多。」——当你放下「我能得到什么」的计算时，你反而会发现周围的人都愿意帮你。","actions":["每周做一件不求回报的小事，帮完就忘","帮人后不要提，也不要期待感谢","先付出再想回报，把「我能帮什么」放在「我能得什么」之前"],"quote":"「你今天帮了别人，不要提；如果对方知道了，他们会感激你一辈子。」"}};
var MC=[-1,0,0,1,2];
var dimMap={1:"criticism",2:"defensive",3:"indifference",4:"taking",5:"criticism",6:"defensive",7:"indifference",8:"taking",9:"criticism",10:"indifference",11:"indifference",12:"defensive",13:"criticism",14:"narcissism",15:"narcissism",16:"forgetful",17:"forgetful",18:"taking",19:"narcissism",20:"criticism",21:"indifference",22:"narcissism",23:"forgetful",24:"defensive",25:"taking"};
var dimMax={criticism:14,indifference:14,defensive:12,taking:12,narcissism:12,forgetful:10};
var TOTAL_MAX=70;
var DIM_ORDER=["criticism","indifference","narcissism","forgetful","defensive","taking"];
var DIM_LABELS={criticism:"批评型",indifference:"冷漠型",narcissism:"自恋型",forgetful:"记不住型",defensive:"防御型",taking:"索取型"};
var DIM_COLORS={criticism:"#e74c3c",indifference:"#95a5a6",narcissism:"#f39c12",forgetful:"#9b59b6",defensive:"#e67e22",taking:"#1abc9c"};

function getScores(){var p=new URLSearchParams(window.location.search);var r={};for(var i=1;i<=25;i++){var v=p.get("q"+i);r[i]=v!==null?parseInt(v):0;}return r;}
function calcDims(scores){var d={criticism:0,indifference:0,narcissism:0,forgetful:0,defensive:0,taking:0};for(var q=1;q<=25;q++){var dm=dimMap[q];if(!dm)continue;d[dm]+=(q>=20)?scores[q]:Math.max(0,MC[scores[q]]);}return d;}
function healthOf(dims){var h={};for(var k in dims)h[k]=Math.max(0,Math.round(100-dims[k]/dimMax[k]*100));return h;}
function fc(p){return p>=70?"#2ecc71":p>=50?"#f39c12":"#e74c3c";}

function drawRadar(h){
    var svg=document.getElementById("radar-svg");
    var cx=150,cy=150,r=95,html="";
    for(var ring=1;ring<=4;ring++)html+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*ring/4)+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    for(var i=0;i<6;i++){
        var a=(i*60-90)*Math.PI/180;
        var x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
        html+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x2+'" y2="'+y2+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
        var lx=cx+(r+18)*Math.cos(a),ly=cy+(r+18)*Math.sin(a);
        html+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" fill="'+DIM_COLORS[DIM_ORDER[i]]+'" font-size="10" font-weight="500">'+DIM_LABELS[DIM_ORDER[i]]+'</text>';
    }
    var pts=DIM_ORDER.map(function(d,i){var a=(i*60-90)*Math.PI/180;var pr=h[d]/100*r;return(cx+pr*Math.cos(a))+","+(cy+pr*Math.sin(a));});
    html+='<polygon points="'+pts.join(" ")+'" fill="rgba(46,204,113,0.18)" stroke="#2ecc71" stroke-width="2"/>';
    DIM_ORDER.forEach(function(d,i){var a=(i*60-90)*Math.PI/180;var pr=h[d]/100*r;html+='<circle cx="'+(cx+pr*Math.cos(a))+'" cy="'+(cy+pr*Math.sin(a))+'" r="5" fill="'+DIM_COLORS[d]+'" stroke="#fff" stroke-width="2"/>';});
    svg.innerHTML=html;
    var leg="";
    DIM_ORDER.forEach(function(d){var c=fc(h[d]);leg+='<div class="legend-item"><span class="legend-dot" style="background:'+c+'"></span>+DIM_LABELS[d]+' '+dims[d]+'分</div>';});
    document.getElementById("radar-legend").innerHTML=leg;
}

function toggleDim(idx){var b=document.getElementById("dim-body-"+idx);var t=document.getElementById("dim-toggle-"+idx);if(b.classList.contains("open")){b.classList.remove("open");t.classList.remove("open");}else{b.classList.add("open");t.classList.add("open");}}

function renderReport(){
    var scores=getScores();
    var dims=calcDims(scores);
    var h=healthOf(dims);
    var sorted=Object.entries(dims).sort(function(a,b){return b[1]-a[1];});
    var main=sorted[0];
    var safeDims=Object.entries(dims).filter(function(kv){return h[kv[0]]>=70;});
    var total=Object.values(dims).reduce(function(a,b){return a+b;},0);
    var overall=Math.max(0,Math.round(100-total/TOTAL_MAX*100));
    var hc=document.getElementById("health-card");
    var hs=document.getElementById("health-score");
    var hd=document.getElementById("health-desc");
    var hl=document.getElementById("health-label");
    hs.textContent=overall;
    if(overall<50){hc.style.borderColor="rgba(231,76,60,0.3)";hc.style.background="rgba(231,76,60,0.08)";hs.style.color="#e74c3c";hd.style.color="#e74c3c";hl.style.color="#e74c3c";hd.textContent="核心弱点明显，建议重点关注并改进";}
    else if(overall<70){hc.style.borderColor="rgba(243,156,18,0.3)";hc.style.background="rgba(243,156,18,0.08)";hs.style.color="#f39c12";hd.style.color="#f39c12";hl.style.color="#f39c12";hd.textContent="多个维度有信号，需要有意识地调整";}
    else if(overall<85){hc.style.borderColor="rgba(46,204,113,0.25)";hc.style.background="rgba(46,204,113,0.08)";hs.style.color="#2ecc71";hd.style.color="#8892b0";hl.style.color="#2ecc71";hd.textContent="整体良好，有1-2个维度需要注意";}
    else{hc.style.borderColor="rgba(46,204,113,0.25)";hc.style.background="rgba(46,204,113,0.08)";hs.style.color="#2ecc71";hd.style.color="#8892b0";hl.style.color="#2ecc71";hd.textContent="恭喜！各指标健康，你的人际模式非常健康";}
    drawRadar(h);
    var mainD=dimData[main[0]];
    document.getElementById("main-icon").textContent=mainD.icon;
    document.getElementById("main-name").textContent=mainD.name;
    document.getElementById("main-desc").textContent=mainD.desc;
    document.getElementById("main-score").textContent=dims[main[0]];
    document.getElementById("carnegie-quote").textContent=mainD.quote;
    document.getElementById("why-section").textContent=mainD.why;
    document.getElementById("carnegie-why-block").textContent=mainD.carnegieWhy;
    document.getElementById("impact-section").textContent=mainD.impact;
    document.getElementById("carnegie-impact-block").textContent=mainD.carnegieImpact;
    var actHtml="";
    mainD.actions.forEach(function(a,i){actHtml+='<div class="action-card"><span class="action-num">'+(i+1)+'</span><span class="action-text">'+a+'</span></div>';});
    document.getElementById("action-tips").innerHTML=actHtml;
    var dimCardsHtml="";
    DIM_ORDER.forEach(function(d,i){var dd=dimData[d];var pct=h[d];var c=fc(pct);dimCardsHtml+='<div class="dim-card"><div class="dim-card-header" onclick="toggleDim('+i+')"><div class="dim-header-left"><span class="dim-icon">'+dd.icon+'</span><span class="dim-name">'+dd.name+'</span></div><div class="dim-health-bar-wrap"><div class="dim-health-bar"><div class="dim-health-fill" style="width:'+pct+'%;background:'+c+'"></div></div></div><span class="dim-health-pct" style="color:'+c+'">'+dims[d]+'分</span><span class="dim-toggle" id="dim-toggle-'+i+'">&#9660;</span></div><div class="dim-card-body" id="dim-body-'+i+'"><p class="dim-intro">'+dd.intro+'</p><p class="dim-quote">'+dd.carnegieWhy+'</p></div></div>';});
    document.getElementById("dim-cards").innerHTML=dimCardsHtml;
    if(safeDims.length>0){var sh="";safeDims.forEach(function(kv){var sd=dimData[kv[0]];sh+='<div class="safe-card"><span class="safe-icon">'+sd.icon+'</span><span class="safe-name">'+sd.name+'</span>（健康度 '+dims[kv[0]]+'%）— 这方面你表现健康！</div>';});document.getElementById("safe-weakness").innerHTML=sh;}
    else{document.getElementById("safe-section").style.display="none";}
    document.getElementById("share-btn").onclick=function(){var mn=document.getElementById("main-name").textContent;var mp=document.getElementById("main-score").textContent;var qt=mainD.quote.substring(0,45);var txt="我在【测测你的人性弱点】中发现了自己的短板：\n\n"+mainD.icon+" "+mn+"（健康度"+mp+"）\n\n\""+qt+"...\n\n卡耐基说这是人际关系的杀手\n快来测测你的 ↓";if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){alert("已复制！去小红书/朋友圈分享吧~");});};
}
renderReport();
</script>
